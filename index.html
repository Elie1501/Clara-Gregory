<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mariage de Clara & Gregory</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Mise à jour des couleurs vers le thème doré/beige */
            --pastel-rose: #A89B85; /* Doré/Beige du thème */
            --accent-couleur: #8A7B65; /* Doré plus sombre pour le hover */

            --blanc-pur: #FFFFFF;
            --texte-gris: #455A64;
            --pastel-jaune: #FFF9C4;
            --vert-tendre: #C8E6C9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Cormorant Garamond', serif;
            background-color: var(--blanc-pur);
            overflow: hidden;
            perspective: 2000px;
        }

        /* --- PAGE GLOBALE --- */
        #global-page-content {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--blanc-pur);
            transform-style: preserve-3d;
            transform-origin: left center;
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .page-turn-active {
            transform: rotateY(-130deg);
        }

        /* --- FOND --- */
        .background-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background-image: url('Gemini_Generated_Image_hrt1d2hrt1d2hrt1.png');
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            opacity: 0.15;
        }

        /* --- PLUIE DE COULEURS --- */
        #rain-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5; overflow: hidden;
        }
        .rain-speck {
            position: absolute; width: 5px; height: 5px;
            border-radius: 50%; opacity: 0;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh); opacity: 0; }
            20% { opacity: 0.7; }
            100% { transform: translateY(110vh); opacity: 0; }
        }

        /* --- CONTENEUR CENTRAL --- */
        .card-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        /* --- ARCHE GÉANTE --- */
        .photo-container {
            width: 240px;
            height: 340px;
            position: relative;
            margin-bottom: 25px;
            border: 4px solid #fff;
            background: #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border-top-left-radius: 120px;
            border-top-right-radius: 120px;
            overflow: hidden;
        }

        .photo-container img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }

        /* --- TITRE --- */
        h1 {
            font-family: 'Pinyon Script', cursive;
            font-size: 3.5rem;
            color: var(--texte-gris);
            margin: 0 0 10px 0;
            line-height: 1;
        }

        /* --- COMPTEUR --- */
        .countdown {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            color: var(--texte-gris);
            justify-content: center;
        }

        .count-box { display: flex; flex-direction: column; align-items: center; }
        .count-num {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--pastel-rose); /* Doré pour les chiffres */
        }
        .count-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            opacity: 0.8;
        }

        /* --- BOUTON --- */
        .btn {
            background-color: var(--pastel-rose); /* Doré pour le bouton */
            color: #fff;
            text-decoration: none;
            padding: 16px 45px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            transition: all 0.4s ease;
            border: none;
            font-weight: 700;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(168, 155, 133, 0.4);
        }

        .btn:hover {
            background-color: var(--accent-couleur);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(138, 123, 101, 0.3);
        }

        @media (max-width: 400px) {
            .photo-container { width: 200px; height: 280px; border-top-left-radius: 100px; border-top-right-radius: 100px;}
            h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

<div id="global-page-content">
    <div class="background-container"></div>
    <div id="rain-container"></div>

    <div class="card-wrapper">
        <div class="photo-container">
            <img src="mykonos.jpg" alt="Clara & Gregory">
        </div>

        <h1>Clara & Gregory</h1>

        <div class="countdown" id="countdown">
            <div class="count-box"><span class="count-num" id="d">00</span><span class="count-label">Jours</span></div>
            <div class="count-box"><span class="count-num" id="h">00</span><span class="count-label">Hrs</span></div>
            <div class="count-box"><span class="count-num" id="m">00</span><span class="count-label">Min</span></div>
            <div class="count-box"><span class="count-num" id="s">00</span><span class="count-label">Sec</span></div>
        </div>

        <a href="invitation.html" class="btn" id="open-btn">Découvrir l'invitation</a>
    </div>
</div>

<script>
    const targetDate = new Date(2026, 6, 13, 15, 0, 0).getTime();
    setInterval(() => {
        const now = new Date().getTime();
        const diff = targetDate - now;

        if (diff > 0) {
            document.getElementById("d").innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("h").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("m").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("s").innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }
    }, 1000);

    function createRain() {
        const container = document.getElementById('rain-container');
        // Pluie harmonisée avec le thème (Or, Blanc, Beige)
        const colors = ['#A89B85', '#FFFFFF', '#EBE3D3', '#D1C4E9'];
        for (let i = 0; i < 40; i++) {
            const speck = document.createElement('div');
            speck.classList.add('rain-speck');
            speck.style.left = Math.random() * 100 + '%';
            speck.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            speck.style.animationDuration = (Math.random() * 3 + 4) + 's';
            speck.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(speck);
        }
    }
    createRain();

    document.getElementById('open-btn').addEventListener('click', function(e) {
        e.preventDefault();
        document.getElementById('global-page-content').classList.add('page-turn-active');
        setTimeout(() => {
            window.location.href = this.getAttribute('href');
        }, 1000);
    });
</script>

</body>
</html>
