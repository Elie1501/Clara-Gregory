<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clara & Grégory - 26.07.2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold-flowers: #A89B85;
            --font-script: 'Great Vibes', cursive;
            --font-serif: 'Cinzel', serif;
        }

        body, html { height: 100vh; width: 100vw; margin: 0; overflow: hidden; background-color: #F8F7F5; }

        .landing-container {
            width: 100%; height: 100%;
            background-image: url('fondfinal.png');
            background-size: 100% 100%;
            background-position: center;
            display: flex; align-items: center; justify-content: center;
        }

        .hero-content {
            width: 85%; text-align: center;
            animation: fadeIn 1.8s ease-out;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* AJOUT DE L'ARCHE PHOTO */
        .photo-arche {
            width: 130px; /* Taille adaptée pour ne pas pousser le texte trop bas */
            height: 170px;
            background: #fff;
            padding: 4px;
            border: 1px solid rgba(168, 155, 133, 0.2);
            border-radius: 65px 65px 0 0;
            margin-bottom: 5px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            animation: floatArche 6s ease-in-out infinite;
        }

        .photo-arche img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 60px 60px 0 0;
        }

        .exit-active { opacity: 0; transform: scale(1.05) translateY(-10px); }

        h1 { font-family: var(--font-serif); font-size: 1.6rem; letter-spacing: 3px; text-transform: uppercase; color: #1a1a1a; line-height: 1.1; margin: 0; }
        .ampersand { font-family: var(--font-script); font-size: 2.2rem; color: var(--gold-flowers); line-height: 0.6; text-transform: lowercase; display: block; margin: 2px 0; }

        .countdown { display: flex; justify-content: center; gap: 12px; margin: 10px 0; }
        .count-number { display: block; font-size: 1.4rem; font-weight: 300; color: #1a1a1a; line-height: 1; }
        .count-label { font-family: 'Montserrat', sans-serif; font-size: 0.45rem; text-transform: uppercase; color: var(--gold-flowers); letter-spacing: 1px; }

        .enter-btn {
            background-color: #1a1a1a; color: #fff; text-decoration: none; padding: 12px 30px;
            font-family: var(--font-serif); font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.4s; margin-top: 10px; cursor: pointer; border: none;
        }

        @keyframes floatArche {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="landing-container">
    <div class="hero-content" id="mainHero">

        <!-- Bloc Arche Photo ajouté -->
        <div class="photo-arche">
            <img src="Nb.jpg" alt="Clara & Grégory">
        </div>

        <h1><br>Clara <span class="ampersand"><br>&<br></span><br>Grégory</br></h1>

        <div class="countdown">
            <div class="count-item"><span class="count-number" id="days">00</span><span class="count-label">Jours</span></div>
            <div class="count-item"><span class="count-number" id="hours">00</span><span class="count-label">Heures</span></div>
            <div class="count-item"><span class="count-number" id="mins">00</span><span class="count-label">Min</span></div>
            <div class="count-item"><span class="count-number" id="secs">00</span><span class="count-label">Sec</span></div>
        </div>

        <button onclick="transitionToInvite()" class="enter-btn">Ouvrir l’invitation</button>
    </div>
</div>

<script>
    function transitionToInvite() {
        document.getElementById('mainHero').classList.add('exit-active');
        setTimeout(() => { window.location.href = 'invitation.html'; }, 800);
    }

    const weddingDate = new Date("July 26, 2026 17:30:00").getTime();
    function updateCountdown() {
        const now = new Date().getTime();
        const distance = weddingDate - now;
        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((distance % (1000 * 60)) / 1000);
        document.getElementById("days").innerText = d.toString().padStart(2, '0');
        document.getElementById("hours").innerText = h.toString().padStart(2, '0');
        document.getElementById("mins").innerText = m.toString().padStart(2, '0');
        document.getElementById("secs").innerText = s.toString().padStart(2, '0');
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>
</body>
</html>
