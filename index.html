<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mariage de Clara & Grégory</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --or-luxe: #A08954;
            --or-clair: #D4C59A;
            --blanc-creme: #FFFEFA;
            --texte-sombre: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Cormorant Garamond', serif;
            background-color: #000;
            overflow: hidden;
            perspective: 2000px;
        }

        /* --- CONTENEUR DE LA PAGE (COUVERTURE) --- */
        #global-page-content {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--blanc-creme);
            transform-style: preserve-3d;
            transform-origin: left center;
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .page-turn-active {
            transform: rotateY(-110deg);
            opacity: 0.5;
        }

        /* --- FOND FLORAL --- */
        .background-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background-image: url('Cadre-floral-or.png');
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
        }

        /* --- PLUIE D'OR --- */
        #gold-rain-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5; overflow: hidden;
        }
        .gold-speck {
            position: absolute; width: 3px; height: 3px;
            background-color: var(--or-luxe); border-radius: 50%; opacity: 0;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(110vh); opacity: 0; }
        }

        /* --- CONTENU --- */
        .content-inner {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(3rem, 12vw, 5rem);
            color: var(--or-luxe); /* Texte en Or pour le prestige */
            margin-bottom: 20px;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.1);
        }

        .countdown {
            display: flex;
            gap: 15px;
            margin-bottom: 45px;
            color: var(--texte-sombre);
            justify-content: center;
        }
        .count-box { display: flex; flex-direction: column; align-items: center; min-width: 55px; }
        .count-num {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--texte-sombre);
            border-bottom: 1.5px solid var(--or-luxe);
            padding-bottom: 5px;
            margin-bottom: 5px;
            width: 100%;
        }
        .count-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--or-luxe);
            font-weight: 700;
        }

        /* --- BOUTON AJUSTÉ --- */
        .btn {
            display: inline-block;
            background-color: var(--or-luxe); /* Bouton Or */
            color: #fff;
            text-decoration: none;
            padding: 16px 40px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            border: 1px solid var(--or-luxe);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(160, 137, 84, 0.3);
        }

        .btn:hover {
            background-color: var(--texte-sombre); /* Devient noir au survol */
            border-color: var(--texte-sombre);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

<div id="global-page-content">
    <div class="background-container"></div>
    <div id="gold-rain-container"></div>

    <div class="content-inner">
        <h1>Clara & Grégory</h1>

        <div class="countdown" id="countdown">
            <div class="count-box"><span class="count-num" id="d">00</span><span class="count-label">Jours</span></div>
            <div class="count-box"><span class="count-num" id="h">00</span><span class="count-label">Hrs</span></div>
            <div class="count-box"><span class="count-num" id="m">00</span><span class="count-label">Min</span></div>
            <div class="count-box"><span class="count-num" id="s">00</span><span class="count-label">Sec</span></div>
        </div>

        <a href="premiere-page.html" class="btn" id="open-btn">Voir l'invitation</a>
    </div>
</div>

<script>
    // Timer pour le 26 Juillet 2026 (Date Houppa)
    const targetDate = new Date(2026, 6, 26, 17, 0, 0).getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const diff = targetDate - now;
        if (diff > 0) {
            document.getElementById("d").innerText = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
            document.getElementById("h").innerText = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
            document.getElementById("m").innerText = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
            document.getElementById("s").innerText = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
        }
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();

    function createGoldRain() {
        const container = document.getElementById('gold-rain-container');
        for (let i = 0; i < 35; i++) {
            const speck = document.createElement('div');
            speck.classList.add('gold-speck');
            speck.style.left = Math.random() * 100 + '%';
            speck.style.animationDuration = (Math.random() * 3 + 4) + 's';
            speck.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(speck);
        }
    }
    createGoldRain();

    document.getElementById('open-btn').addEventListener('click', function(e) {
        e.preventDefault();
        const link = this.getAttribute('href');
        document.getElementById('global-page-content').classList.add('page-turn-active');

        setTimeout(() => {
            window.location.href = link;
        }, 1100);
    });
</script>

</body>
</html>
